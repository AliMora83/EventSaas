server {
    listen 80;
    server_name eventsaas.namka.cloud;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eventsaas.namka.cloud;

    # ── SSL (Certbot manages these paths) ────────────────
    ssl_certificate     /etc/letsencrypt/live/eventsaas.namka.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventsaas.namka.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static files ─────────────────────────────────────
    root /var/www/eventsaas;
    index index.html;

    # ── SPA fallback (React Router) ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets — long-term cache ─────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
